services:
  - type: web
    name: media-download-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm run build:web && npm start -w @media/backend
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CORS_ORIGINS
        value: "*"
      - key: MAX_CONCURRENT_DOWNLOADS
        value: "2"
      - key: STORAGE_DIR
        value: /tmp/media-storage
